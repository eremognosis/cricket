      - name: seasons
        meta:
          external_location: "'../data/stageddata/seasons.parquet'"
      - name: playeridmap
        meta:
          external_location: "'../data/stageddata/playeridmap.parquet'"
      - name: peoplematchdata
        meta:
          external_location: "'../data/stageddata/peoplematchdata/*/*.parquet'"